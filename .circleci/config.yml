#
# Circle CI configuration. Runs each time we push a new commit to Github.
#
# This file is derived from the project's Dockerfile, which we use for
# local testing.
#
version: 2.1
jobs:
  build:
    docker:
      - image: ocaml/opam:debian-12-ocaml-5.3

    working_directory: ~/ocaml-tree-sitter
    environment:
      PATH: /home/opam/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    steps:
      - checkout
      - run:
          name: install system dependencies
          command: sudo apt-get update && sudo apt-get install -y m4 pkg-config python3-pip && pip3 install --break-system-packages pre-commit
      - run:
          name: set up node
          command: ./scripts/setup-node
      - run:
          name: fetch submodules
          command: git submodule update --init --recursive --depth 1
      - run:
          name: configure
          command: ./configure
      - run:
          name: install dependencies
          command: opam exec -- make setup
      - run:
          name: check code formatting
          command: ./scripts/lint
      - run:
          name: build
          command: opam exec -- make
      - run:
          name: install
          command: opam exec -- make install
      - run:
          name: unit tests
          command: opam exec -- make unit
      - run:
          name: end-to-end tests
          command: opam exec -- make e2e

workflows:
  version: 2

  build-on-commit:
    # Default trigger, on commit.
    jobs:
      - build
