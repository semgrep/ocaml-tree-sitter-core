name: pre-commit

on:
  push:
  pull_request:

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: semgrep/setup-ocaml@ce6a88f72f48e02a172c93eb93177b21659e7032
        with:
          cache-prefix: v5
          ocaml-compiler: ocaml-variants.5.3.0+options,ocaml-option-flambda
          opam-pin: false
          save-opam-post-run: true

      - name: Install ocp-indent and add to PATH
        run: |
          opam install -y ocp-indent
          echo "$(opam var bin)" >> "$GITHUB_PATH"

      - uses: pre-commit/action@646c83fcd040023954eafda54b4db0192ce70507
